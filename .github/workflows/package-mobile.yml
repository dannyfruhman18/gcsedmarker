name: Package GCSEmarker for mobile

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run cap:sync
      - uses: actions/upload-artifact@v4
        with:
          name: gcsedmarker-web-build
          path: dist
